<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB PORTAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <h2>JOB PORTAL</h2>

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Jobs</a></li>
                <li><a href="#">Companies</a></li>
                <li><a href="#">Post a Job</a></li>
                <li><a href="#">Login/Register</a></li>
            </ul>

        </nav>
    </header>

    <main>

        <!-- Hero Section -->
        <section id="hero">
            <h1>Find Your Dream Job</h1>

            <p>
                Search thousands of jobs from top companies and start your career today.
            </p>

            <button class="btn-primary">Search Jobs</button>
            <button class="btn-secondary">Post a Job</button>

        </section>

        <!-- Job Listings Section-->
        <section id="job-search">

            <h2>Search Job Opportunities</h2>

            <form>
                <div>
                    <label for="job-title">Job Title</label> 
                    <input 
                        type="text" id="job-title" 
                        name="job-title" 
                        placeholder="eg. Software Engineer">
                </div>

                <div>
                    <label for="job-type">Work Mode</label>
                    <select id="job-type" name="job-type">
                        <option value="full-time">Full-Time</option>
                        <option value="part-time">Part-Time</option>
                        <option value="on-site">On-Site</option>
                        <option value="remote">Remote</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>

                <button type="submit">Search Jobs</button>

            </form>

        </section>
        
        <section id="job-listings">
            <h2>Latest Job Openings</h2>
            <div class="job-container" id="job-container"></div>
            

        </section>
    </main>

    <footer>
            <p> 2026 Job Portal. All Rights Reserved.</p>
    </footer>

</body>
</html>
